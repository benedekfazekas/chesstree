<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{CHESSTREE_TITLE}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* -----------------------------------------------------------------------
       Theme tokens — dark (default)
    ----------------------------------------------------------------------- */
    :root {
      --bg:            #1a1a2e;
      --chrome-bg:     #16213e;
      --chrome-border: #0f3460;
      --text:          #e0e0e0;
      --text-muted:    #aaa;
      --text-faint:    #666;
      --text-dim:      #888;
      --btn-bg:        #0f3460;
      --btn-border:    #533483;
      --btn-hover:     #533483;
      --card-bg:       #1e3a6e;
      --card-border:   #2a5090;
      --card-hover-border: #533483;
      --card-hover-shadow: #533483aa;
      --card-drag-border:  #e94560;
      --card-drag-shadow:  #e94560aa;
      --card-collapsed-border: #888;
      --root-card-bg:  #0f3460;
      --root-card-border: #533483;
      --var-card-bg:   #2d1f52;
      --var-card-border: #4a3070;
      --var-card-hover-border: #7755aa;
      --var-card-hover-shadow: #7755aaaa;
      --var-header-color: #b09ad0;
      --root-title-color: #fff;
      --root-meta-color:  #aaa;
      --root-comment-color: #ccc;
      --moves-color:   #d0d0d0;
      --move-num-color: #888;
      --comment-color: #b0b8c8;
      --hr-color:      #0f3460;
      --edge-label-fill: #aaa;
      --link-main-stroke: #0f3460;
      --link-var-stroke:  #533483;
      --popup-border:  #533483;
      --popup-shadow:  #0009;
    }

    /* Light theme overrides */
    :root.light {
      --bg:            #f0f2f5;
      --chrome-bg:     #e0e4ed;
      --chrome-border: #b0bcd4;
      --text:          #1a1a2e;
      --text-muted:    #555;
      --text-faint:    #777;
      --text-dim:      #666;
      --btn-bg:        #c8d4ea;
      --btn-border:    #7755aa;
      --btn-hover:     #b09ad0;
      --card-bg:       #ffffff;
      --card-border:   #b0bcd4;
      --card-hover-border: #7755aa;
      --card-hover-shadow: #7755aa44;
      --card-drag-border:  #e94560;
      --card-drag-shadow:  #e9456044;
      --card-collapsed-border: #aaa;
      --root-card-bg:  #dde4f4;
      --root-card-border: #7755aa;
      --var-card-bg:   #f0ebfa;
      --var-card-border: #c4add8;
      --var-card-hover-border: #7755aa;
      --var-card-hover-shadow: #7755aa44;
      --var-header-color: #5a3a80;
      --root-title-color: #1a1a2e;
      --root-meta-color:  #555;
      --root-comment-color: #444;
      --moves-color:   #222;
      --move-num-color: #777;
      --comment-color: #445;
      --hr-color:      #b0bcd4;
      --edge-label-fill: #555;
      --link-main-stroke: #8899bb;
      --link-var-stroke:  #9977cc;
      --popup-border:  #7755aa;
      --popup-shadow:  #0003;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 1rem;
      background: var(--chrome-bg);
      border-bottom: 1px solid var(--chrome-border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    header button {
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--text);
      padding: 0.25rem 0.65rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    header button:hover { background: var(--btn-hover); }

    #tree-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    svg#tree-svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    svg#tree-svg:active { cursor: grabbing; }

    /* Node cards rendered inside <foreignObject> */
    .node-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.78rem;
      line-height: 1.5;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none;
    }
    .node-card:hover {
      border-color: var(--card-hover-border);
      box-shadow: 0 0 6px var(--card-hover-shadow);
    }
    .node-card.collapsed {
      border-style: dashed;
      border-color: var(--card-collapsed-border);
    }
    .node-card.dragging {
      border-color: var(--card-drag-border);
      box-shadow: 0 0 10px var(--card-drag-shadow);
      cursor: grabbing;
    }

    /* Root card */
    .node-card.root-card {
      background: var(--root-card-bg);
      border-color: var(--root-card-border);
    }

    /* Variation card — purple tint to distinguish from main line */
    .node-card.variation-card {
      background: var(--var-card-bg);
      border-color: var(--var-card-border);
    }
    .node-card.variation-card:hover {
      border-color: var(--var-card-hover-border);
      box-shadow: 0 0 6px var(--var-card-hover-shadow);
    }
    .node-card.variation-card .node-header {
      color: var(--var-header-color);
    }

    .root-title { font-weight: 700; font-size: 0.85rem; color: var(--root-title-color); }
    .root-meta  { color: var(--root-meta-color); font-size: 0.72rem; margin-top: 2px; }
    .root-comment { font-style: italic; color: var(--root-comment-color); margin-top: 4px; font-size: 0.75rem; }

    .moves-line { color: var(--moves-color); word-break: break-word; }
    .move-num  { color: var(--move-num-color); font-size: 0.72rem; }

    .nag-blunder    { color: #cc2200; font-weight: bold; }
    .nag-mistake    { color: #e05040; font-weight: bold; }
    .nag-dubious    { color: #e08020; }
    .nag-speculative{ color: #f4bc4f; }
    .nag-good       { color: #84c043; font-weight: bold; }
    .nag-brilliant  { color: #66ccff; font-weight: bold; }

    .node-comment {
      font-style: italic;
      color: var(--comment-color);
      margin-top: 3px;
      font-size: 0.74rem;
      word-break: break-word;
    }

    .node-image {
      display: block;
      width: 100px;
      height: 100px;
      margin-top: 4px;
    }

    .node-header {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.7rem;
      margin-bottom: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .node-header .collapsed-count {
      font-weight: normal;
      color: var(--text-dim);
      font-style: italic;
    }
    .node-card hr {
      border: none;
      border-top: 1px solid var(--hr-color);
      margin: 3px 0;
    }

    /* Edge labels */
    .edge-label {
      font-size: 0.72rem;
      fill: var(--edge-label-fill);
      pointer-events: none;
    }

    /* Links */
    .link-main {
      fill: none;
      stroke: var(--link-main-stroke);
      stroke-width: 1.5px;
    }
    .link-variation {
      fill: none;
      stroke: var(--link-var-stroke);
      stroke-width: 1.5px;
      stroke-dasharray: 4,3;
    }

    /* Help bar */
    #help-bar {
      background: var(--chrome-bg);
      border-top: 1px solid var(--chrome-border);
      padding: 3px 1rem;
      font-size: 0.7rem;
      color: var(--text-faint);
      flex-shrink: 0;
    }

    /* Hover board popup */
    #hover-popup {
      display: none;
      position: fixed;
      pointer-events: none;
      border: 1px solid var(--popup-border);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 4px 16px var(--popup-shadow);
      z-index: 100;
    }
    #hover-popup img { display: block; }

    /* View toggle */
    .view-toggle-group {
      display: flex;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--btn-border);
    }
    .view-toggle {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.25rem 0.65rem;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.15s, color 0.15s;
    }
    .view-toggle + .view-toggle { border-left: 1px solid var(--btn-border); }
    .view-toggle:hover { background: var(--btn-hover); color: var(--text); }
    .view-toggle.active { background: var(--btn-bg); color: var(--text); font-weight: 600; }

    /* Deck view */
    #deck-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
      gap: 0.75rem;
    }

    .deck-breadcrumb {
      font-size: 0.8rem;
      color: var(--text-muted);
      width: 100%;
      max-width: 520px;
    }
    .deck-breadcrumb-link {
      color: var(--link-var-stroke);
      cursor: pointer;
      text-decoration: underline;
    }
    .deck-breadcrumb-link:hover { color: var(--text); }
    .deck-breadcrumb-sep { color: var(--text-faint); margin: 0 0.25rem; }
    .deck-breadcrumb-current { color: var(--text); }

    .deck-nav-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 560px;
    }

    .deck-arrow {
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .deck-arrow:hover:not(.disabled) { background: var(--btn-hover); }
    .deck-arrow.disabled { opacity: 0.3; cursor: default; }

    .deck-card-wrapper {
      flex: 1;
      min-width: 0;
    }

    .deck-card-content .node-card {
      width: 100%;
      height: auto;
      cursor: default;
      font-size: 0.85rem;
      line-height: 1.6;
      padding: 12px 16px;
    }
    .deck-card-content .node-card:hover {
      border-color: var(--card-border);
      box-shadow: none;
    }
    .deck-card-content .node-card.variation-card:hover {
      border-color: var(--var-card-border);
      box-shadow: none;
    }
    .deck-card-content .node-image {
      width: 180px;
      height: 180px;
    }
    .deck-card-content .root-title { font-size: 1rem; }
    .deck-card-content .root-meta  { font-size: 0.82rem; }
    .deck-card-content .root-comment { font-size: 0.85rem; }

    .deck-counter {
      font-size: 0.75rem;
      color: var(--text-faint);
    }

    .deck-variations {
      width: 100%;
      max-width: 480px;
      border: 1px solid var(--chrome-border);
      border-radius: 6px;
      padding: 8px;
      background: var(--chrome-bg);
    }
    .deck-variations-header {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .deck-var-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--var-card-bg);
      border: 1px solid var(--var-card-border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-bottom: 4px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .deck-var-btn:last-child { margin-bottom: 0; }
    .deck-var-btn:hover {
      border-color: var(--var-card-hover-border);
      box-shadow: 0 0 4px var(--var-card-hover-shadow);
    }
    .deck-var-move { font-weight: 600; }
    .deck-var-comment {
      font-size: 0.74rem;
      font-style: italic;
      color: var(--comment-color);
      margin-top: 2px;
    }

    /* View-switch animations */
    #tree-container, #deck-container {
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    .view-exit       { opacity: 0 !important; }
    .view-exit-zoom  { opacity: 0 !important; transform: scale(1.12) !important; }
    .view-exit-shrink{ opacity: 0 !important; transform: scale(0.88) !important; }
    .view-enter      { opacity: 0 !important; transform: scale(0.97) !important; }
  </style>
</head>
<body>
  <header>
    <h1>{{CHESSTREE_TITLE}}</h1>
    <div class="view-toggle-group">
      <button id="btn-view-tree" class="view-toggle active" title="Tree view">🌳 Tree</button>
      <button id="btn-view-deck" class="view-toggle" title="Deck view">📇 Deck</button>
    </div>
    <button id="btn-theme" title="Toggle light/dark theme">☀ Light</button>
    <button id="btn-reset" title="Re-run layout (R)">↺ Reset</button>
  </header>

  <div id="tree-container">
    <svg id="tree-svg">
      <g id="zoom-layer">
        <g id="links-layer"></g>
        <g id="edge-labels-layer"></g>
        <g id="nodes-layer"></g>
      </g>
    </svg>
  </div>

  <div id="deck-container" style="display:none"></div>

  <div id="help-bar">
    <span id="help-tree">Click node to collapse/expand &nbsp;·&nbsp;
    Double-click to open in deck &nbsp;·&nbsp;
    Drag to reposition &nbsp;·&nbsp; ⌘/Ctrl+drag to move subtree &nbsp;·&nbsp;
    Scroll to zoom &nbsp;·&nbsp; R to reset</span>
    <span id="help-deck" style="display:none">← → step through cards &nbsp;·&nbsp;
    Click variation to enter &nbsp;·&nbsp; Esc to go back &nbsp;·&nbsp;
    Double-click card to open in tree &nbsp;·&nbsp; R to reset</span>
  </div>

  <div id="hover-popup"><img id="hover-img" src="" alt="board"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    // -----------------------------------------------------------------------
    // Data
    // -----------------------------------------------------------------------
    const treeData = JSON.parse(`{{CHESSTREE_TREE_DATA}}`);
    {{CHESSTREE_IMAGES}}
    {{CHESSTREE_HOVER_DATA}}

    // -----------------------------------------------------------------------
    // Dimensions
    // -----------------------------------------------------------------------
    const NODE_WIDTH  = 210;
    const NODE_HEIGHT_BASE = 60;   // fallback estimate per block without image
    const IMAGE_HEIGHT = 112;       // image row height
    const NODE_DY_MIN = 16;         // minimum vertical gap between nodes

    // NAG css-class → fill color (mirrors the CSS nag-* classes for use in SVG)
    const NAG_COLORS = {
      "nag-blunder":     "#cc2200",
      "nag-mistake":     "#e05040",
      "nag-dubious":     "#e08020",
      "nag-speculative": "#f4bc4f",
      "nag-good":        "#84c043",
      "nag-brilliant":   "#66ccff",
    };

    // Compute NODE_DX from the widest single edge-label line across all edges.
    // The gap between node edges = NODE_DX - NODE_WIDTH, so label must fit in that gap.
    // Approximation: 0.72rem font, average char ~6.5px.
    const EDGE_LABEL_CHAR_PX = 6.5;
    function _maxEdgeLabelChars(node) {
      let max = 0;
      const lbl = node.edgeLabel;
      if (lbl) {
        const lines = [
          lbl.move,
          ...(lbl.startingComment || []),
          ...(lbl.comment || []),
        ];
        lines.forEach(l => { if (l.length > max) max = l.length; });
      }
      (node.children || []).forEach(c => {
        const child = _maxEdgeLabelChars(c);
        if (child > max) max = child;
      });
      return max;
    }
    const _maxLabelChars = _maxEdgeLabelChars(treeData);
    // label_width + NODE_WIDTH + padding gives enough room between node edges
    const NODE_DX = Math.max(280, Math.ceil(_maxLabelChars * EDGE_LABEL_CHAR_PX) + NODE_WIDTH + 40);

    // Populated by measureAndInit(); used by estimateNodeHeight.
    const measuredHeights = new Map();   // nodeKey → measured px height

    function estimateNodeHeight(d) {
      const key = nodeKey(d.data);
      if (measuredHeights.has(key)) return measuredHeights.get(key);
      // Fallback estimate used before measurement pass completes
      if (d.data.type === "root") {
        let h = 58;
        if (d.data.gameComment) h += 18;
        return h;
      }
      let h = NODE_HEIGHT_BASE;
      const moves = d.data.moves || [];
      const hasComment = moves.some(m => m.comment);
      const hasImage = moves.some(m => m.image);
      if (hasComment) h += 36;
      if (hasImage) h += IMAGE_HEIGHT;
      return h;
    }

    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    let root;
    let nodePositions = new Map();   // id → {x, y} manual overrides
    let collapsedIds  = new Set();   // click: collapse all children
    let currentView   = 'tree';     // 'tree' or 'deck'
    let clickTimer    = null;       // single/double-click disambiguation
    let pendingFocus  = null;       // nodeKey to zoom to after measureAndInit

    // -----------------------------------------------------------------------
    // D3 hierarchy + layout
    // -----------------------------------------------------------------------
    function buildHierarchy(data) {
      return d3.hierarchy(data, d => {
        const key = nodeKey(d);
        if (!d.children || !d.children.length) return null;
        if (collapsedIds.has(key)) return null;
        return d.children;
      });
    }

    function nodeKey(d) {
      // Use the first move's fen as a stable key, or root title
      if (d.type === "root") return "root";
      if (d.moves && d.moves.length) return d.moves[0].fen;
      return JSON.stringify(d);
    }

    function runLayout(hierRoot) {
      const layout = d3.tree()
        .nodeSize([1, NODE_DX])
        .separation((a, b) => {
          const ha = measuredHeights.has(nodeKey(a.data))
            ? measuredHeights.get(nodeKey(a.data))
            : estimateNodeHeight(a);
          const hb = measuredHeights.has(nodeKey(b.data))
            ? measuredHeights.get(nodeKey(b.data))
            : estimateNodeHeight(b);
          return ha / 2 + NODE_DY_MIN + hb / 2;
        });
      layout(hierRoot);
    }

    // -----------------------------------------------------------------------
    // SVG setup
    // -----------------------------------------------------------------------
    const svg = d3.select("#tree-svg");
    const zoomLayer = svg.select("#zoom-layer");
    const linksLayer = svg.select("#links-layer");
    const edgeLabsLayer = svg.select("#edge-labels-layer");
    const nodesLayer = svg.select("#nodes-layer");

    const zoom = d3.zoom()
      .scaleExtent([0.1, 4])
      .filter(event => {
        // Pan only on background (not on nodes)
        return event.target === svg.node() ||
               event.target.closest("#zoom-layer") === null ||
               event.target.id === "tree-svg";
      })
      .on("zoom", event => {
        zoomLayer.attr("transform", event.transform);
      });

    svg.call(zoom);

    // -----------------------------------------------------------------------
    // Rendering
    // -----------------------------------------------------------------------
    function render() {
      const hierRoot = buildHierarchy(treeData);
      runLayout(hierRoot);

      // Apply manual overrides
      hierRoot.each(d => {
        const key = nodeKey(d.data);
        if (nodePositions.has(key)) {
          const pos = nodePositions.get(key);
          d.x = pos.x;
          d.y = pos.y;
        }
      });

      const allNodes = hierRoot.descendants();
      const allLinks = hierRoot.links();

      // Render links
      const linkPath = d3.linkHorizontal()
        .x(d => d.y)
        .y(d => d.x);

      const linkSel = linksLayer.selectAll(".tree-link")
        .data(allLinks, d => nodeKey(d.target.data));

      linkSel.enter()
        .append("path")
        .merge(linkSel)
        .attr("class", d =>
          d.target.data.isVariation ? "tree-link link-variation" : "tree-link link-main"
        )
        .attr("d", linkPath)
        .attr("opacity", 0)
        .transition().duration(200)
        .attr("opacity", 1);

      linkSel.exit()
        .transition().duration(200)
        .attr("opacity", 0)
        .remove();

      // Edge labels
      const edgeLabelSel = edgeLabsLayer.selectAll(".edge-label-g")
        .data(allLinks.filter(d => d.target.data.edgeLabel), d => nodeKey(d.target.data));

      const edgeLabelEnter = edgeLabelSel.enter()
        .append("g")
        .attr("class", "edge-label-g");
      edgeLabelEnter.append("text").attr("class", "edge-label");

      const edgeLabelMerge = edgeLabelEnter.merge(edgeLabelSel);
      edgeLabelMerge
        .transition().duration(200)
        .attr("transform", d => {
          const mx = (d.source.y + d.target.y) / 2;
          const my = (d.source.x + d.target.x) / 2 - 4;
          return `translate(${mx},${my})`;
        });
      edgeLabelMerge.select("text")
        .attr("text-anchor", "middle")
        .each(function(d) {
          const lbl = d.target.data.edgeLabel;
          const el = d3.select(this);
          el.selectAll("tspan").remove();
          // Build ordered list of {text, nagClass} lines
          const lines = [];
          (lbl.startingComment || []).forEach(l => lines.push({ text: l, nagClass: null }));
          lines.push({ text: lbl.move, nagClass: lbl.nagClass });
          (lbl.comment || []).forEach(l => lines.push({ text: l, nagClass: null }));
          lines.forEach((line, i) => {
            const ts = el.append("tspan")
              .attr("x", 0)
              .attr("dy", i === 0 ? "0" : "1.2em")
              .text(line.text);
            if (line.nagClass && NAG_COLORS[line.nagClass]) {
              ts.attr("fill", NAG_COLORS[line.nagClass])
                .style("font-weight", "bold");
            }
          });
        });

      edgeLabelSel.exit().remove();

      // Nodes
      const nodeSel = nodesLayer.selectAll(".tree-node")
        .data(allNodes, d => nodeKey(d.data));

      const nodeEnter = nodeSel.enter()
        .append("g")
        .attr("class", "tree-node")
        .attr("transform", d => `translate(${d.y - NODE_WIDTH / 2},${d.x - estimateNodeHeight(d) / 2})`);

      nodeEnter.each(function(d) {
        const g = d3.select(this);
        const h = estimateNodeHeight(d);
        const fo = g.append("foreignObject")
          .attr("width", NODE_WIDTH)
          .attr("height", h);
        fo.append("xhtml:div")
          .attr("xmlns", "http://www.w3.org/1999/xhtml")
          .html(buildNodeHTML(d));
      });

      // Attach interaction to entering nodes
      nodeEnter
        .call(makeDrag())
        .on("click", function(event, d) {
          if (event.defaultPrevented) return;
          // Disambiguate single vs double click
          if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; return; }
          clickTimer = setTimeout(() => {
            clickTimer = null;
            const key = nodeKey(d.data);
            if (d.data.type === "root") return;
            if (!(d.data.children && d.data.children.length)) return;
            if (collapsedIds.has(key)) {
              collapsedIds.delete(key);
            } else {
              collapsedIds.add(key);
            }
            render();
          }, 250);
        })
        .on("dblclick", function(event, d) {
          if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
          event.preventDefault();
          event.stopPropagation();
          const stack = buildDeckStackForNode(d.data);
          if (stack) {
            deckState.stack = stack;
            animateSwitch('deck', 'view-exit-zoom', { skipInit: true });
          }
        });

      // Update existing nodes
      const nodeMerge = nodeEnter.merge(nodeSel);
      nodeMerge.transition().duration(200)
        .attr("transform", d => `translate(${d.y - NODE_WIDTH / 2},${d.x - estimateNodeHeight(d) / 2})`);

      // Refresh HTML content (collapse state may have changed)
      nodeMerge.each(function(d) {
        const fo = d3.select(this).select("foreignObject");
        const h = estimateNodeHeight(d);
        fo.attr("height", h);
        fo.select("div").html(buildNodeHTML(d));
      });

      nodeSel.exit()
        .transition().duration(200)
        .attr("opacity", 0)
        .remove();
    }

    // -----------------------------------------------------------------------
    // Node HTML builder
    // -----------------------------------------------------------------------

    function buildRootHTML(data) {
      const headers = data.headers || {};
      const event   = headers.Event  || "";
      const site    = headers.Site   || "";
      const eco     = headers.ECO    || "";
      const opening = headers.Opening || "";
      const result  = headers.Result  || "";
      const metaParts = [event, site].filter(Boolean);
      if (eco && eco !== "?") metaParts.push(`ECO: ${eco}`);
      if (opening && opening !== "?") metaParts.push(opening);
      if (result && result !== "?") metaParts.push(`Result: ${result}`);
      let html = `<div class="node-card root-card">`;
      html += `<div class="root-title">${esc(data.title || "")}</div>`;
      if (metaParts.length) {
        html += `<div class="root-meta">${esc(metaParts.join(" · "))}</div>`;
      }
      if (data.gameComment) {
        html += `<div class="root-comment">${esc(data.gameComment)}</div>`;
      }
      html += `</div>`;
      return html;
    }

    function segmentHeader(data, collapsedCount) {
      const moves = data.moves || [];
      if (!moves.length) return "";
      const lineType = data.isMainLine ? "Main line" : "Variation";
      const startNum = parseInt(moves[0].num);
      const endNum   = parseInt(moves[moves.length - 1].num);
      const range    = startNum === endNum ? `${startNum}` : `${startNum}–${endNum}`;
      const countBadge = collapsedCount > 0
        ? ` <span class="collapsed-count">▶ ${collapsedCount} hidden</span>`
        : "";
      return `<div class="node-header"><span>${lineType}: ${range}</span>${countBadge}</div><hr/>`;
    }

    // Return { collapsed, hiddenCount } for a data node
    function collapseState(data) {
      const key = nodeKey(data);
      const collapsed = collapsedIds.has(key);
      const hiddenCount = collapsed ? countDescendants(data) : 0;
      return { collapsed, hiddenCount };
    }

    // Split a moves array into blocks ending at commented moves.
    function splitMovesIntoBlocks(moves) {
      const blocks = [];
      let current = [];
      for (const m of (moves || [])) {
        current.push(m);
        if (m.comment) {
          blocks.push({ moves: current, comment: m.comment });
          current = [];
        }
      }
      if (current.length) blocks.push({ moves: current, comment: null });
      return blocks;
    }

    function countDescendants(data) {
      let count = 0;
      function walk(node) {
        (node.children || []).forEach(c => { count++; walk(c); });
      }
      walk(data);
      return count;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // -----------------------------------------------------------------------
    // Drag behaviour
    // -----------------------------------------------------------------------
    function makeDrag() {
      let startX, startY, origPositions, dragged, subtreeMode;

      return d3.drag()
        .on("start", function(event, d) {
          startX = event.x;
          startY = event.y;
          dragged = false;
          subtreeMode = event.sourceEvent.ctrlKey || event.sourceEvent.metaKey;
          // Snapshot original positions of this node (and subtree if ctrl/cmd)
          origPositions = new Map();
          const hierRoot = buildHierarchy(treeData);
          runLayout(hierRoot);
          // Re-apply any existing manual overrides so origPositions are current
          hierRoot.each(n => {
            const k = nodeKey(n.data);
            if (nodePositions.has(k)) {
              const p = nodePositions.get(k);
              n.x = p.x; n.y = p.y;
            }
          });
          const draggedNode = hierRoot.descendants().find(n => nodeKey(n.data) === nodeKey(d.data));
          if (!draggedNode) return;
          const targets = subtreeMode ? draggedNode.descendants() : [draggedNode];
          targets.forEach(n => origPositions.set(nodeKey(n.data), { x: n.x, y: n.y }));
          d3.select(this).select(".node-card").classed("dragging", true);
        })
        .on("drag", function(event, d) {
          const dx = event.x - startX;
          const dy = event.y - startY;
          if (Math.abs(dx) > 5 || Math.abs(dy) > 5) dragged = true;
          if (!dragged) return;
          // Apply delta to all tracked nodes
          origPositions.forEach((orig, key) => {
            nodePositions.set(key, { x: orig.x + dy, y: orig.y + dx });
          });
          // Re-render all affected node elements live
          nodesLayer.selectAll(".tree-node")
            .each(function(n) {
              const k = nodeKey(n.data);
              if (nodePositions.has(k)) {
                const p = nodePositions.get(k);
                n.x = p.x; n.y = p.y;
                d3.select(this)
                  .attr("transform", `translate(${n.y - NODE_WIDTH / 2},${n.x - estimateNodeHeight(n) / 2})`);
              }
            });
          // Re-draw links and edge labels live
          linksLayer.selectAll(".tree-link")
            .attr("d", d3.linkHorizontal().x(n => n.y).y(n => n.x));
          edgeLabsLayer.selectAll(".edge-label-g")
            .attr("transform", l => {
              const mx = (l.source.y + l.target.y) / 2;
              const my = (l.source.x + l.target.x) / 2 - 4;
              return `translate(${mx},${my})`;
            });
        })
        .on("end", function(event, d) {
          d3.select(this).select(".node-card").classed("dragging", false);
          if (!dragged) {
            // Undo all position overrides set during this drag
            origPositions.forEach((_, key) => nodePositions.delete(key));
          }
        });
    }

    // -----------------------------------------------------------------------
    // Hover boards
    // -----------------------------------------------------------------------
    const popup  = document.getElementById("hover-popup");
    const popImg = document.getElementById("hover-img");

    document.addEventListener("mousemove", function(event) {
      if (!hoverEnabled) return;
      const target = event.target;
      const nodeId = target.dataset && target.dataset.nodeid;
      if (nodeId && hoverImages[nodeId]) {
        const svgData = hoverImages[nodeId];
        popImg.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgData);
        popImg.style.width = "150px";
        popImg.style.height = "150px";
        popup.style.display = "block";
        popup.style.left = (event.clientX + 14) + "px";
        popup.style.top  = (event.clientY + 14) + "px";
      } else {
        popup.style.display = "none";
      }
    });

    function buildMovesHTML(blockMoves, hoverFens) {
      let html = "";
      (blockMoves || []).forEach((m, i) => {
        const showNum = m.num.endsWith(".") || i === 0;
        if (showNum) html += `<span class="move-num">${esc(m.num)}</span> `;
        const nodeId = m.fen ? findNodeIdForFen(hoverFens, m.fen) : null;
        const dataAttr = nodeId ? ` data-nodeid="${nodeId}"` : "";
        if (m.nagClass) {
          html += `<span class="${m.nagClass}"${dataAttr}>${esc(m.san)}${m.nag ? esc(m.nag) : ""}</span> `;
        } else {
          html += `<span${dataAttr}>${esc(m.san)}</span> `;
        }
      });
      return html;
    }

    function findNodeIdForFen(hoverFens, fen) {
      for (const [nodeId, f] of Object.entries(hoverFens)) {
        if (f === fen) return nodeId;
      }
      return null;
    }

    function buildSegmentHTML(d, data) {
      const { collapsed, hiddenCount } = collapseState(data);
      let cls = "node-card";
      if (!data.isMainLine) cls += " variation-card";
      if (collapsed) cls += " collapsed";

      let html = `<div class="${cls}">`;
      html += segmentHeader(data, hiddenCount);

      const blocks = splitMovesIntoBlocks(data.moves);
      blocks.forEach((blk, bi) => {
        html += `<div class="moves-line">`;
        if (hoverEnabled) {
          html += buildMovesHTML(blk.moves, data.hoverFens || {});
        } else {
          blk.moves.forEach((m, i) => {
            const showNum = m.num.endsWith(".") || (i === 0 && bi !== 0);
            if (showNum) html += `<span class="move-num">${esc(m.num)}</span> `;
            if (m.nagClass) {
              html += `<span class="${m.nagClass}">${esc(m.san)}${m.nag ? esc(m.nag) : ""}</span> `;
            } else {
              html += `${esc(m.san)} `;
            }
          });
        }
        html += `</div>`;
        if (blk.comment) html += `<div class="node-comment">${esc(blk.comment)}</div>`;
        const img = blk.moves[blk.moves.length - 1]?.image;
        if (img) html += `<img class="node-image" src="./${esc(img)}" alt="board position">`;
      });

      html += `</div>`;
      return html;
    }

    function buildNodeHTML(d) {
      const data = d.data;
      if (data.type === "root") return buildRootHTML(data);
      return buildSegmentHTML(d, data);
    }

    // -----------------------------------------------------------------------
    // Theme toggle
    // -----------------------------------------------------------------------
    const btnTheme = document.getElementById("btn-theme");
    function applyTheme(light) {
      if (light) {
        document.documentElement.classList.add("light");
        btnTheme.textContent = "🌙 Dark";
      } else {
        document.documentElement.classList.remove("light");
        btnTheme.textContent = "☀ Light";
      }
      // Re-render so SVG fill/stroke tokens update
      render();
    }
    btnTheme.addEventListener("click", function() {
      applyTheme(!document.documentElement.classList.contains("light"));
    });

    // -----------------------------------------------------------------------
    // Keyboard shortcuts
    // -----------------------------------------------------------------------
    document.addEventListener("keydown", function(e) {
      if (e.key === "r" || e.key === "R") {
        if (currentView === 'tree') {
          nodePositions.clear();
          collapsedIds.clear();
          measuredHeights.clear();
          measureAndInit();
        } else {
          initDeck();
          renderDeck();
        }
        return;
      }
      if (currentView === 'deck') {
        if (e.key === "ArrowRight") { e.preventDefault(); deckNext(); }
        else if (e.key === "ArrowLeft") { e.preventDefault(); deckPrev(); }
        else if (e.key === "Escape") { e.preventDefault(); deckBack(); }
      }
    });

    document.getElementById("btn-reset").addEventListener("click", function() {
      if (currentView === 'tree') {
        nodePositions.clear();
        collapsedIds.clear();
        measuredHeights.clear();
        measureAndInit();
      } else {
        initDeck();
        renderDeck();
      }
    });

    // -----------------------------------------------------------------------
    // Fit view helper
    // -----------------------------------------------------------------------
    function fitView() {
      const container = document.getElementById("tree-container");
      const W = container.clientWidth;
      const H = container.clientHeight;

      // Collect all node positions from the rendered DOM
      const hierRoot = buildHierarchy(treeData);
      runLayout(hierRoot);
      const nodes = hierRoot.descendants();
      if (!nodes.length) return;

      const minY = d3.min(nodes, d => d.y) - NODE_WIDTH / 2;
      const maxY = d3.max(nodes, d => d.y) + NODE_WIDTH / 2;
      const minX = d3.min(nodes, d => d.x) - NODE_HEIGHT_BASE;
      const maxX = d3.max(nodes, d => d.x) + NODE_HEIGHT_BASE;

      const treeW = maxY - minY;
      const treeH = maxX - minX;
      const scale = Math.min(0.95 * W / treeW, 0.95 * H / treeH, 1.5);
      const tx = -minY * scale + (W - treeW * scale) / 2;
      const ty = -minX * scale + (H - treeH * scale) / 2;

      svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }

    // -----------------------------------------------------------------------
    // Two-pass init: measure actual node heights, then render with correct sizes
    // -----------------------------------------------------------------------
    function measureAndInit() {
      const hierRoot = buildHierarchy(treeData);
      runLayout(hierRoot);
      const allNodes = hierRoot.descendants();

      // Render nodes offscreen so the browser can calculate actual text heights.
      const offscreen = svg.append("g")
        .attr("id", "measure-group")
        .attr("transform", "translate(-9999,0)");

      const foMap = new Map();
      allNodes.forEach(d => {
        const key = nodeKey(d.data);
        const fo = offscreen.append("foreignObject")
          .attr("width", NODE_WIDTH)
          .attr("height", 2000);   // tall enough to never clip
        fo.append("xhtml:div")
          .attr("xmlns", "http://www.w3.org/1999/xhtml")
          .html(buildNodeHTML(d));
        foMap.set(key, fo.node());
      });

      // Wait two animation frames so the browser has laid out the HTML.
      requestAnimationFrame(() => requestAnimationFrame(() => {
        let maxH = NODE_HEIGHT_BASE;
        foMap.forEach((foEl, key) => {
          const div = foEl.querySelector("div");
          if (div) {
            const h = div.scrollHeight + 12;   // +12 for breathing room
            measuredHeights.set(key, h);
            if (h > maxH) maxH = h;
          }
        });
        offscreen.remove();
        render();
        if (pendingFocus) {
          focusTreeNode(pendingFocus);
          pendingFocus = null;
        } else {
          fitView();
        }
      }));
    }

    // -----------------------------------------------------------------------
    // Deck view
    // -----------------------------------------------------------------------
    const deckState = { stack: [] };

    function initDeck() {
      const mainLine = [treeData];
      (treeData.children || []).forEach(c => {
        if (c.isMainLine) mainLine.push(c);
      });
      deckState.stack = [{ items: mainLine, index: 0 }];
    }

    function currentDeckLevel() {
      return deckState.stack[deckState.stack.length - 1];
    }

    function deckNext() {
      const level = currentDeckLevel();
      if (level.index < level.items.length - 1) {
        level.index++;
        renderDeck();
      }
    }

    function deckPrev() {
      const level = currentDeckLevel();
      if (level.index > 0) {
        level.index--;
        renderDeck();
      }
    }

    function deckEnterVariation(parentItem, varIndex) {
      const variations = getDeckVariations(parentItem);
      if (!variations.length || varIndex >= variations.length) return;
      deckState.stack.push({ items: variations, index: varIndex });
      renderDeck();
    }

    function deckBack() {
      if (deckState.stack.length > 1) {
        deckState.stack.pop();
        renderDeck();
      }
    }

    function getDeckVariations(item) {
      if (!item.children || !item.children.length) return [];
      if (item.type === 'root') {
        return item.children.filter(c => !c.isMainLine);
      }
      return item.children;
    }

    function renderDeck() {
      const container = document.getElementById('deck-container');
      const level = currentDeckLevel();
      const item = level.items[level.index];
      const hasPrev = level.index > 0;
      const hasNext = level.index < level.items.length - 1;
      const variations = getDeckVariations(item);

      // Breadcrumb
      let breadcrumbHTML = '';
      deckState.stack.forEach((lvl, i) => {
        if (i > 0) breadcrumbHTML += ' <span class="deck-breadcrumb-sep">\u203a</span> ';
        let label;
        if (i === 0) {
          label = 'Main line';
        } else {
          const lvlItem = lvl.items[lvl.index];
          label = lvlItem.edgeLabel ? lvlItem.edgeLabel.move : 'Variation';
        }
        if (i < deckState.stack.length - 1) {
          breadcrumbHTML += `<a class="deck-breadcrumb-link" data-level="${i}">${esc(label)}</a>`;
        } else {
          breadcrumbHTML += `<span class="deck-breadcrumb-current">${esc(label)}</span>`;
        }
      });

      // Card HTML
      let cardHTML;
      if (item.type === 'root') {
        cardHTML = buildRootHTML(item);
      } else {
        cardHTML = buildSegmentHTML({ data: item }, item);
      }

      // Variation buttons
      let variationsHTML = '';
      if (variations.length) {
        variationsHTML = '<div class="deck-variations">';
        variationsHTML += '<div class="deck-variations-header">Variations</div>';
        variations.forEach((v, i) => {
          const edge = v.edgeLabel;
          let btnContent = '';
          if (edge) {
            if (edge.startingComment) {
              btnContent += `<div class="deck-var-comment">${esc(edge.startingComment.join(' '))}</div>`;
            }
            btnContent += `<span class="deck-var-move${edge.nagClass ? ' ' + edge.nagClass : ''}">${esc(edge.move)}</span>`;
            if (edge.comment) {
              btnContent += `<div class="deck-var-comment">${esc(edge.comment.join(' '))}</div>`;
            }
          } else {
            btnContent = `Variation ${i + 1}`;
          }
          variationsHTML += `<button class="deck-var-btn" data-var-index="${i}">${btnContent}</button>`;
        });
        variationsHTML += '</div>';
      }

      container.innerHTML = `
        <div class="deck-breadcrumb">${breadcrumbHTML}</div>
        <div class="deck-nav-area">
          <button class="deck-arrow${hasPrev ? '' : ' disabled'}" id="deck-prev" ${hasPrev ? '' : 'disabled'} title="Previous (\u2190)">\u25c0</button>
          <div class="deck-card-wrapper">
            <div class="deck-card-content">${cardHTML}</div>
          </div>
          <button class="deck-arrow${hasNext ? '' : ' disabled'}" id="deck-next" ${hasNext ? '' : 'disabled'} title="Next (\u2192)">\u25b6</button>
        </div>
        <div class="deck-counter">${level.index + 1} / ${level.items.length}</div>
        ${variationsHTML}
      `;

      const prevBtn = container.querySelector('#deck-prev');
      const nextBtn = container.querySelector('#deck-next');
      if (prevBtn) prevBtn.addEventListener('click', deckPrev);
      if (nextBtn) nextBtn.addEventListener('click', deckNext);

      container.querySelectorAll('.deck-var-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          deckEnterVariation(item, parseInt(btn.dataset.varIndex));
        });
      });

      container.querySelectorAll('.deck-breadcrumb-link').forEach(link => {
        link.addEventListener('click', () => {
          deckState.stack.length = parseInt(link.dataset.level) + 1;
          renderDeck();
        });
      });

      // Double-click card to explode back to tree view
      const cardEl = container.querySelector('.deck-card-content');
      if (cardEl) {
        cardEl.addEventListener('dblclick', () => {
          animateSwitch('tree', 'view-exit-shrink', { focusNodeData: item });
        });
      }
    }

    // -----------------------------------------------------------------------
    // View switching (animated)
    // -----------------------------------------------------------------------
    function updateViewUI() {
      const btnTree = document.getElementById('btn-view-tree');
      const btnDeck = document.getElementById('btn-view-deck');
      const helpTree = document.getElementById('help-tree');
      const helpDeck = document.getElementById('help-deck');

      if (currentView === 'tree') {
        btnTree.classList.add('active');
        btnDeck.classList.remove('active');
        helpTree.style.display = '';
        helpDeck.style.display = 'none';
      } else {
        btnTree.classList.remove('active');
        btnDeck.classList.add('active');
        helpTree.style.display = 'none';
        helpDeck.style.display = '';
      }
    }

    function animateSwitch(targetView, exitClass, options) {
      if (targetView === currentView) return;
      options = options || {};

      const treeC = document.getElementById('tree-container');
      const deckC = document.getElementById('deck-container');
      const outEl = currentView === 'tree' ? treeC : deckC;
      const inEl  = targetView === 'tree' ? treeC : deckC;

      outEl.classList.add(exitClass || 'view-exit');

      setTimeout(() => {
        outEl.style.display = 'none';
        outEl.classList.remove('view-exit', 'view-exit-zoom', 'view-exit-shrink');

        currentView = targetView;
        updateViewUI();

        if (targetView === 'deck') {
          if (!options.skipInit) initDeck();
          renderDeck();
        }

        if (targetView === 'tree' && options.focusNodeData) {
          pendingFocus = options.focusNodeData;
          collapsedIds.clear();
          nodePositions.clear();
          measuredHeights.clear();
          measureAndInit();
        }

        inEl.classList.add('view-enter');
        inEl.style.display = '';

        requestAnimationFrame(() => requestAnimationFrame(() => {
          inEl.classList.remove('view-enter');
        }));
      }, 280);
    }

    // Path-finding: build the deck navigation stack to reach a specific node
    function findPathToNode(root, target) {
      if (root === target) return [root];
      for (const child of (root.children || [])) {
        const sub = findPathToNode(child, target);
        if (sub) return [root, ...sub];
      }
      return null;
    }

    function buildDeckStackForNode(targetData) {
      const path = findPathToNode(treeData, targetData);
      if (!path) return null;

      const mainLine = [treeData];
      (treeData.children || []).forEach(c => {
        if (c.isMainLine) mainLine.push(c);
      });

      if (targetData === treeData) {
        return [{ items: mainLine, index: 0 }];
      }

      const stack = [];
      const firstChild = path[1];

      if (firstChild.isMainLine) {
        const mainIdx = mainLine.indexOf(firstChild);
        stack.push({ items: mainLine, index: mainIdx >= 0 ? mainIdx : 1 });
      } else {
        stack.push({ items: mainLine, index: 0 });
        const rootVars = getDeckVariations(treeData);
        const varIdx = rootVars.indexOf(firstChild);
        stack.push({ items: rootVars, index: varIdx >= 0 ? varIdx : 0 });
      }

      for (let i = 2; i < path.length; i++) {
        const parent = path[i - 1];
        const node = path[i];
        if (node.isMainLine) {
          stack[0].index = mainLine.indexOf(node);
        } else {
          const vars = getDeckVariations(parent);
          const idx = vars.indexOf(node);
          stack.push({ items: vars, index: idx >= 0 ? idx : 0 });
        }
      }

      return stack;
    }

    // Zoom the tree view to center on a specific data node
    function focusTreeNode(targetData) {
      const hierRoot = buildHierarchy(treeData);
      runLayout(hierRoot);
      hierRoot.each(d => {
        const k = nodeKey(d.data);
        if (nodePositions.has(k)) {
          const pos = nodePositions.get(k);
          d.x = pos.x; d.y = pos.y;
        }
      });

      const targetKey = nodeKey(targetData);
      const target = hierRoot.descendants().find(d => nodeKey(d.data) === targetKey);
      if (!target) { fitView(); return; }

      const container = document.getElementById('tree-container');
      const W = container.clientWidth;
      const H = container.clientHeight;
      const scale = 1.0;
      const tx = W / 2 - target.y * scale;
      const ty = H / 2 - target.x * scale;

      svg.transition().duration(500)
        .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }

    document.getElementById('btn-view-tree').addEventListener('click', () => animateSwitch('tree', 'view-exit'));
    document.getElementById('btn-view-deck').addEventListener('click', () => {
      initDeck();
      animateSwitch('deck', 'view-exit', { skipInit: true });
    });

    // -----------------------------------------------------------------------
    // Initial render
    // -----------------------------------------------------------------------
    measureAndInit();
  </script>
</body>
</html>
